<li><a href='/anisync/settings' class='nav-link'>Settings</a></li>
<li><a href='/anisync/history' class='nav-link'>Sync History</a></li>
<li>
    <select id='user-switcher' onchange='switchUser(this.value)' class='btn btn-secondary' style='margin-right: 10px;'>
        {USER_OPTIONS}
    </select>
</li>
<li><form action='/anisync/logout' method='post' style='display: inline;'><button type='submit' class='btn btn-secondary'>Logout</button></form></li>

<script>
function switchUser(username) {
    if (username) {
        fetch('/anisync/switch-user', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: username})
        }).then(response => {
            if (response.ok) {
                window.location.reload();
            }
        });
    }
}
</script>
