<div class='alert alert-success'>
    ✅ Connected to MyAnimeList as <strong>{USERNAME}</strong>
</div>
<div class='alert alert-info'>
    👤 Current Shoko User: <strong>{SHOKO_USER}</strong>
    <form method='post' action='/anisync/switch-shoko-user' style='display: inline-block; margin-left: 10px;'>
        <select name='username' onchange='this.form.submit()' class='form-control' style='display: inline-block; width: auto;'>
            {SHOKO_USER_OPTIONS}
        </select>
    </form>
</div>
<div class='stats-grid'>
    <div class='stat-card'>
        <div class='stat-value'>{TOTAL_ANIME}</div>
        <div class='stat-label'>Total Anime</div>
    </div>
    <div class='stat-card'>
        <div class='stat-value'>{SYNCED_ANIME}</div>
        <div class='stat-label'>Synced with MAL</div>
    </div>
    <div class='stat-card'>
        <div class='stat-value'>{LAST_SYNC}</div>
        <div class='stat-label'>Last Sync</div>
    </div>
    <div class='stat-card'>
        <div class='stat-value'>{PENDING}</div>
        <div class='stat-label'>Pending Updates</div>
    </div>
</div>
