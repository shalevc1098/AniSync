<li class='nav-item-link'><a href='/anisync' class='nav-link'>Dashboard</a></li>
<li class='nav-item-link'><a href='/anisync/settings' class='nav-link'>Settings</a></li>
<li class='nav-item-link'><a href='/anisync/history' class='nav-link'>Sync History</a></li>
<li>
    <div class='user-info nav-link' id='userInfo' style='display: none;'>
        <img src='' alt='Avatar' class='user-avatar' id='userAvatar' style='width: 32px; height: 32px; border-radius: 50%; margin-right: 8px; vertical-align: middle; display: none;'>
        <span class='user-avatar-fallback' id='userAvatarFallback' style='display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin-right: 8px; vertical-align: middle; font-size: 14px; font-weight: 600;'><i class="fas fa-user"></i></span>
        <span id='userName' style='font-weight: 600; color: #46bcf2;'></span>
    </div>
</li>

<script>
// The navbar is identical markup for everyone; login state is resolved client-side
// from the Shoko session so no per-user data is baked into the page server-side.
document.addEventListener('DOMContentLoaded', async function() {
    const links = document.querySelectorAll('.nav-item-link');
    const userInfo = document.getElementById('userInfo');
    let loggedIn = false;

    const apiSessionStr = localStorage.getItem('apiSession');
    if (apiSessionStr) {
        try {
            const apiSession = JSON.parse(apiSessionStr);
            if (apiSession && apiSession.apikey) {
                const response = await fetch('/api/v3/User/Current', {
                    headers: { 'apikey': apiSession.apikey }
                });
                if (response.ok) {
                    const userData = await response.json();
                    if (userData && userData.Username) {
                        loggedIn = true;
                        document.getElementById('userName').textContent = userData.Username;

                        const fallback = document.getElementById('userAvatarFallback');
                        const avatarUrl = userData.Avatar || userData.AvatarUrl || userData.avatar;
                        if (avatarUrl && (avatarUrl.startsWith('http://') || avatarUrl.startsWith('https://') || avatarUrl.startsWith('/') || avatarUrl.startsWith('data:'))) {
                            const img = document.getElementById('userAvatar');
                            img.src = avatarUrl;
                            img.style.display = 'inline-block';
                            fallback.style.display = 'none';
                        } else {
                            fallback.textContent = userData.Username.charAt(0).toUpperCase();
                        }
                    }
                }
            }
        } catch (e) {
            console.error('Failed to load user info:', e);
        }
    }

    // Show the nav links and user chip only when logged in.
    links.forEach(l => l.style.display = loggedIn ? '' : 'none');
    userInfo.style.display = loggedIn ? '' : 'none';
});
</script>
