<div class='card'>
    <h1 class='card-title'><i class="fas fa-history" style="margin-right: 8px;"></i>Sync History</h1>
    
    <div class='history-stats'>
        <div class='stat-item'>
            <span class='stat-value'>{TOTAL_SYNCS}</span>
            <span class='stat-label'>Total Syncs</span>
        </div>
        <div class='stat-item'>
            <span class='stat-value'>{FAILED_SYNCS}</span>
            <span class='stat-label'>Failed</span>
        </div>
        <div class='stat-item'>
            <span class='stat-value'>{SUCCESS_RATE}%</span>
            <span class='stat-label'>Success Rate</span>
        </div>
        <div class='stat-item'>
            <span class='stat-value'>{LAST_SYNC}</span>
            <span class='stat-label'>Last Sync</span>
        </div>
    </div>
    
    <div class='history-filters'>
        <button class='filter-btn active' onclick='filterHistory("all")'>All</button>
        <button class='filter-btn' onclick='filterHistory("success")'>Success</button>
        <button class='filter-btn' onclick='filterHistory("failed")'>Failed</button>
        <button class='filter-btn' onclick='filterHistory("today")'>Today</button>
    </div>
    
    <div class='history-list'>
        {HISTORY_ENTRIES}
    </div>
</div>

<style>
.history-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-item {
    background: #252a48;
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #2b3556;
    transition: transform 0.3s, border-color 0.3s;
}

.stat-item:hover {
    transform: translateY(-2px);
    border-color: #46bcf2;
}

.stat-value {
    display: block;
    font-size: 2rem;
    font-weight: 700;
    color: #46bcf2;
    margin-bottom: 8px;
}

.stat-label {
    display: block;
    color: #9ca9b3;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.history-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

.filter-btn {
    padding: 8px 20px;
    background: #252a48;
    border: 1px solid #2b3556;
    border-radius: 20px;
    color: #9ca9b3;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

.filter-btn:hover {
    background: #2e51a2;
    color: #e1e7f5;
    border-color: #2e51a2;
}

.filter-btn.active {
    background: #2e51a2;
    border-color: #2e51a2;
    color: white;
}

.history-list {
    max-height: 500px;
    overflow-y: auto;
    padding-right: 10px;
}

.history-entry {
    background: #252a48;
    border: 1px solid #2b3556;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 15px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.history-entry:hover {
    background: #1c2137;
    transform: translateX(5px);
}

.history-entry.success {
    border-left: 3px solid #22c55e;
}

.history-entry.failed {
    border-left: 3px solid #ef4444;
}

.entry-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 12px;
}

.entry-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #e1e7f5;
}

.entry-time {
    color: #9ca9b3;
    font-size: 0.85rem;
}

.entry-details {
    display: flex;
    gap: 20px;
    margin-bottom: 10px;
}

.entry-detail {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #9ca9b3;
    font-size: 0.9rem;
}

.entry-status {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
}

.status-success {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
}

.status-failed {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
}

.entry-message {
    color: #9ca9b3;
    font-size: 0.85rem;
    margin-top: 8px;
    font-style: italic;
}

/* Custom scrollbar for history list */
.history-list::-webkit-scrollbar {
    width: 8px;
}

.history-list::-webkit-scrollbar-track {
    background: #1c2137;
    border-radius: 10px;
}

.history-list::-webkit-scrollbar-thumb {
    background: #2b3556;
    border-radius: 10px;
}

.history-list::-webkit-scrollbar-thumb:hover {
    background: #46bcf2;
}
</style>

<script>
function filterHistory(filter) {
    // Update active button
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    // Filter history entries
    const entries = document.querySelectorAll('.history-entry');
    entries.forEach(entry => {
        if (filter === 'all') {
            entry.style.display = 'block';
        } else if (filter === 'success' && entry.classList.contains('success')) {
            entry.style.display = 'block';
        } else if (filter === 'failed' && entry.classList.contains('failed')) {
            entry.style.display = 'block';
        } else if (filter === 'today') {
            // Check if entry is from today
            const timeElement = entry.querySelector('.entry-time');
            if (timeElement && timeElement.textContent.includes('Today')) {
                entry.style.display = 'block';
            } else {
                entry.style.display = 'none';
            }
        } else {
            entry.style.display = 'none';
        }
    });
}
</script>
